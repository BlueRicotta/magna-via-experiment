  <line x1="100" y1="44" x2="66" y2="120" stroke="#c8a030" stroke-width="1.6" opacity="0.7"></line>
  <line x1="100" y1="44" x2="134" y2="120" stroke="#c8a030" stroke-width="1.6" opacity="0.7"></line>
  <line x1="66" y1="120" x2="80" y2="96" stroke="#c8a030" stroke-width="1.6" opacity="0.7"></line>
  <line x1="134" y1="120" x2="120" y2="96" stroke="#c8a030" stroke-width="1.6" opacity="0.7"></line>
