  <line x1="120" y1="96" x2="100" y2="148" stroke="#c8a030" stroke-width="1.6" opacity="0.7"></line>

  
  <circle cx="66" cy="120" r="5" fill="#c8a030" filter="url(#glow)"></circle>
  <circle cx="134" cy="120" r="5" fill="#c8a030" filter="url(#glow)"></circle>
