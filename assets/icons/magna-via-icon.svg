<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#c8a030" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  
  <rect width="200" height="200" rx="44" fill="#0a0a14"></rect>
  <rect width="200" height="200" rx="44" fill="url(#bgGlow)"></rect>

  
  <circle cx="100" cy="100" r="76" fill="none" stroke="#c8a030" stroke-width="0.8" stroke-dasharray="3 6" opacity="0.4"></circle>
